<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tabs Component</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="showTab('panel-1', this)">Tab 1</button>
    <button class="tab-btn"        onclick="showTab('panel-2', this)">Tab 2</button>
    <button class="tab-btn"        onclick="showTab('panel-3', this)">Tab 3</button>
    <button class="tab-btn"        onclick="showTab('panel-4', this)">Tab 4</button>
  </div>

  <div class="tab-panel active" id="panel-1">Content for Tab 1</div>
  <div class="tab-panel"        id="panel-2">Content for Tab 2</div>
  <div class="tab-panel"        id="panel-3">Content for Tab 3</div>
  <div class="tab-panel"        id="panel-4">Content for Tab 4</div>

  <script src="script.js"></script>

</body>
</html>
